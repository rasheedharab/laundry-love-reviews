<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#B8651A" />
  <title>Offline — White Rabbit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: hsl(35, 30%, 96%);
      color: hsl(25, 20%, 12%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: hsl(25, 60%, 44%);
      margin-bottom: 2.5rem;
      letter-spacing: -0.02em;
    }
    .icon-wrap {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: hsl(25, 80%, 52% / 0.1);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
      animation: pulse 2.5s ease-in-out infinite;
    }
    .icon-wrap svg { width: 40px; height: 40px; color: hsl(25, 80%, 52%); }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 0.875rem;
      color: hsl(25, 10%, 50%);
      line-height: 1.6;
      max-width: 280px;
      margin-bottom: 2rem;
    }
    button {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      border: 1.5px solid hsl(25, 60%, 44%);
      background: transparent;
      color: hsl(25, 60%, 44%);
      cursor: pointer;
      transition: all 0.2s;
    }
    button:active { transform: scale(0.97); background: hsl(25, 60%, 44% / 0.08); }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="logo-text">White Rabbit</div>
  <div class="icon-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9.75v6.75m0 0-3-3m3 3 3-3m-8.25 6a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" />
    </svg>
  </div>
  <h1>You're Offline</h1>
  <p>It seems your internet connection dropped. Please reconnect to continue browsing our services.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
